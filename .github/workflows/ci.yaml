    name: CI - Required Checks
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Aggregate job checks
        uses: devantler-tech/actions/aggregate-job-checks@84813ae61fb21741e0a6193b5c14c6941a448577 # v9.0.7
        with:
          job-results: ""
