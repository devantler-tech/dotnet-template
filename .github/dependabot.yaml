version: 2

updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
      semver-major-days: 14
      # devantler-tech NuGet packages are our own code — bump now, no cooldown.
      exclude:
        - "Devantler.*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
      # devantler-tech actions/workflows are our own code — bump now, no cooldown.
      exclude:
        - "devantler-tech/*"
